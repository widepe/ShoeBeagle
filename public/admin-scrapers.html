<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoeBeagle Scraper Runner</title>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4ede3;
      color: #2d2d2d;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      color: #214478;
      margin: 0 0 8px;
      font-size: 2.2rem;
    }

    .subtle {
      color: #666;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search {
      flex: 1 1 320px;
      max-width: 480px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #214478;
      background: #fff;
      font-size: 1rem;
    }

    .pill {
      background: #fff;
      border: 2px solid #214478;
      color: #214478;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .loading, .error-banner {
      padding: 16px 18px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .loading {
      background: #fff;
      border: 2px solid #214478;
      color: #214478;
    }

    .error-banner {
      background: #fff5f5;
      border: 2px solid #dc3545;
      color: #9d1c28;
      white-space: pre-wrap;
      display: none;
    }

    .store-list {
      display: grid;
      gap: 16px;
    }

    .store-card {
      background: #fff;
      border: 2px solid #214478;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .store-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .store-name-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .store-name {
      margin: 0;
      color: #214478;
      font-size: 1.5rem;
    }

    .store-id, .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      background: #eef4ff;
      color: #214478;
    }

    .chip.gray {
      background: #f3f4f6;
      color: #374151;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
    }

    .run-btn {
      background: #2e7d32;
      color: #fff;
    }

    .open-btn {
      background: #214478;
      color: #fff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .notes {
      margin-top: 12px;
      color: #555;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .store-error {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #f3b7bd;
      background: #fff1f2;
      color: #9d1c28;
      white-space: pre-wrap;
      display: none;
    }

    .expanded {
      margin-top: 16px;
      display: none;
      gap: 16px;
    }

    .expanded.visible {
      display: grid;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .panel {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
    }

    .panel h3 {
      margin: 0 0 12px;
      color: #214478;
      font-size: 1.08rem;
    }

    .link-list {
      display: grid;
      gap: 8px;
    }

    .link-list a, .deal-link {
      color: #1d4ed8;
      text-decoration: none;
      word-break: break-all;
    }

    .history-wrap {
      overflow-x: auto;
    }

    .history-table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
    }

    .history-table th,
    .history-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 0.9rem;
    }

    .history-table th {
      background: #f8fafc;
      color: #214478;
    }

    .ok-yes { color: #0f7b35; font-weight: 800; }
    .ok-no { color: #b42318; font-weight: 800; }

    pre {
      margin: 0;
      overflow: auto;
      max-height: 420px;
      background: #111827;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .deals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      max-height: 900px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .deal-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .deal-thumb-wrap {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .deal-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-thumb {
      color: #666;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .deal-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .deal-title {
      font-weight: 800;
      color: #111827;
      line-height: 1.35;
    }

    .price-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .sale-price {
      color: #0f7b35;
      font-weight: 800;
      font-size: 1.05rem;
    }

    .orig-price {
      color: #6b7280;
      text-decoration: line-through;
      font-size: 0.9rem;
    }

    .discount {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: 800;
    }

    .deal-meta {
      display: grid;
      gap: 4px;
      color: #4b5563;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ShoeBeagle Scraper Runner</h1>
    <div class="subtle">Protected by IP allowlist. Uses CRON_SECRET server-side only.</div>

    <div id="loading" class="loading">Loading stores…</div>
    <div id="errorBanner" class="error-banner"></div>

    <div class="toolbar">
      <input id="searchInput" class="search" placeholder="Search stores..." />
      <div id="countPill" class="pill">0 stores</div>
    </div>

    <div id="storeList" class="store-list"></div>
  </div>

  <script>
    let ALL_STORES = [];
    const DETAILS_CACHE = new Map();

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function money(value) {
      const n = Number(value);
      return Number.isFinite(n) ? `$${n.toFixed(2)}` : "—";
    }

    function pct(value) {
      const n = Number(value);
      return Number.isFinite(n) ? `${n.toFixed(0)}%` : "—";
    }

    function duration(ms) {
      const n = Number(ms);
      return Number.isFinite(n) ? `${(n / 1000).toFixed(1)}s` : "—";
    }

    function safeText(value) {
      return String(value ?? "");
    }

    function showTopError(message) {
      const el = document.getElementById("errorBanner");
      el.style.display = "block";
      el.textContent = message;
    }

    function hideTopError() {
      const el = document.getElementById("errorBanner");
      el.style.display = "none";
      el.textContent = "";
    }

    async function apiGet(url) {
      const res = await fetch(url, { cache: "no-store" });
      const json = await res.json().catch(() => null);
      if (!res.ok || !json?.ok) {
        throw new Error(json?.error || `Request failed: ${res.status}`);
      }
      return json;
    }

    async function apiPost(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      const json = await res.json().catch(() => null);
      if (!res.ok || !json?.ok) {
        throw new Error(json?.error || `Request failed: ${res.status}`);
      }
      return json;
    }

    async function loadStores() {
      hideTopError();

      try {
        const data = await apiGet("/api/admin-scrapers?action=list");
        ALL_STORES = Array.isArray(data.stores) ? data.stores : [];
        renderStores();
      } catch (err) {
        showTopError(err.message || "Failed to load stores");
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function renderStores() {
      const search = normalize(document.getElementById("searchInput").value);
      const list = document.getElementById("storeList");

      const visible = ALL_STORES.filter((store) => {
        if (!search) return true;
        const hay = [
          store.displayName,
          store.id,
          ...(Array.isArray(store.aliases) ? store.aliases : []),
        ].join(" ").toLowerCase();
        return hay.includes(search);
      });

      document.getElementById("countPill").textContent =
        `${visible.length} store${visible.length === 1 ? "" : "s"}`;

      list.innerHTML = visible.map((store) => `
        <div class="store-card" id="card-${store.id}">
          <div class="store-top">
            <div>
              <div class="store-name-row">
                <h2 class="store-name">${store.displayName}</h2>
                <span class="store-id">${store.id}</span>
                <span class="chip gray">${store.scraperType || "unknown"}</span>
              </div>

              <div class="meta-row">
                <span class="chip gray">enabled: ${store.enabled ? "true" : "false"}</span>
                <span class="chip gray">updated: ${store.lastUpdated || "—"}</span>
              </div>
            </div>

            <div class="actions">
              <button class="run-btn" ${store.enabled ? "" : "disabled"} onclick="runStore('${store.id}')">Run Scraper</button>
              <button class="open-btn" onclick="toggleStore('${store.id}')">Open</button>
            </div>
          </div>

          <div class="notes">${safeText(store.notes || "No notes.")}</div>
          <div class="store-error" id="store-error-${store.id}"></div>

          <div class="expanded" id="expanded-${store.id}">
            <div class="grid-2">
              <div class="panel">
                <h3>Scraped URLs</h3>
                <div class="link-list" id="scraped-urls-${store.id}"></div>
              </div>

              <div class="panel">
                <h3>Expected Blob</h3>
                <div class="link-list" id="blob-urls-${store.id}"></div>
              </div>
            </div>

            <div class="panel">
              <h3>30-Day History</h3>
              <div class="history-wrap" id="history-${store.id}"></div>
            </div>

            <div class="panel">
              <h3>Top-level Run / Blob Structure</h3>
              <pre id="top-json-${store.id}"></pre>
            </div>

            <div class="panel">
              <h3 id="deals-title-${store.id}">Deals</h3>
              <div class="deals-grid" id="deals-${store.id}"></div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function setStoreError(storeId, message) {
      const el = document.getElementById(`store-error-${storeId}`);
      if (!el) return;
      if (!message) {
        el.style.display = "none";
        el.textContent = "";
        return;
      }
      el.style.display = "block";
      el.textContent = message;
    }

    async function toggleStore(storeId) {
      const expanded = document.getElementById(`expanded-${storeId}`);
      const isOpen = expanded.classList.contains("visible");

      if (isOpen) {
        expanded.classList.remove("visible");
        return;
      }

      expanded.classList.add("visible");
      setStoreError(storeId, "");

      if (DETAILS_CACHE.has(storeId)) {
        fillStorePanels(storeId, DETAILS_CACHE.get(storeId));
        return;
      }

      try {
        const data = await apiGet(`/api/admin-scrapers?action=details&storeId=${encodeURIComponent(storeId)}`);
        DETAILS_CACHE.set(storeId, data);
        fillStorePanels(storeId, data);
      } catch (err) {
        setStoreError(storeId, err.message || "Failed to load store details");
      }
    }

    async function runStore(storeId) {
      setStoreError(storeId, "");

      const card = document.getElementById(`card-${storeId}`);
      const runBtn = card.querySelector(".run-btn");
      if (runBtn) {
        runBtn.disabled = true;
        runBtn.textContent = "Running...";
      }

      document.getElementById(`expanded-${storeId}`).classList.add("visible");

      try {
        const data = await apiPost("/api/admin-scrapers?action=run", { storeId });
        DETAILS_CACHE.set(storeId, data);
        fillStorePanels(storeId, data);
      } catch (err) {
        setStoreError(storeId, err.message || "Failed to run scraper");
      } finally {
        if (runBtn) {
          const store = ALL_STORES.find((s) => s.id === storeId);
          runBtn.disabled = !store?.enabled;
          runBtn.textContent = "Run Scraper";
        }
      }
    }

    function fillStorePanels(storeId, data) {
      const store = data.store || {};
      const latestBlob = data.latestBlob || {};
      const blobData = latestBlob.blobData || null;
      const deals = Array.isArray(latestBlob.deals) ? latestBlob.deals : [];
      const history = Array.isArray(data.history) ? data.history : [];

      const topLevel =
        blobData && typeof blobData === "object" && !Array.isArray(blobData)
          ? blobData
          : (data.triggerResult || {});

      document.getElementById(`scraped-urls-${storeId}`).innerHTML =
        (Array.isArray(store.scrapedUrls) ? store.scrapedUrls : [])
          .map((url) => `<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`)
          .join("") || "<div>None</div>";

      document.getElementById(`blob-urls-${storeId}`).innerHTML =
        (Array.isArray(store.expectedBlob) ? store.expectedBlob : [])
          .map((url) => `<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`)
          .join("") || "<div>None</div>";

      const historyWrap = document.getElementById(`history-${storeId}`);
      if (!history.length) {
        historyWrap.innerHTML = "<div>No history found.</div>";
      } else {
        historyWrap.innerHTML = `
          <table class="history-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>OK</th>
                <th>Count</th>
                <th>Duration</th>
                <th>Via</th>
              </tr>
            </thead>
            <tbody>
              ${history.map((row) => `
                <tr>
                  <td>${safeText(String(row.dayUTC || "").slice(0, 10))}</td>
                  <td class="${row.ok ? "ok-yes" : "ok-no"}">${row.ok ? "Yes" : "No"}</td>
                  <td>${Number(row.count || 0)}</td>
                  <td>${duration(row.durationMs)}</td>
                  <td>${safeText(row.via || "—")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      document.getElementById(`top-json-${storeId}`).textContent =
        JSON.stringify(topLevel, null, 2);

      document.getElementById(`deals-title-${storeId}`).textContent =
        `Deals${deals.length ? ` (${deals.length})` : ""}`;

      const dealsWrap = document.getElementById(`deals-${storeId}`);
      if (!deals.length) {
        dealsWrap.innerHTML = "<div>No deals found in latest blob.</div>";
      } else {
        dealsWrap.innerHTML = deals.map((deal) => `
          <div class="deal-card">
            <div class="deal-thumb-wrap">
              ${
                deal.imageURL
                  ? `<img class="deal-thumb" src="${deal.imageURL}" alt="${safeText(deal.listingName || deal.model || "shoe")}">`
                  : `<div class="no-thumb">No image</div>`
              }
            </div>

            <div class="deal-body">
              <div class="deal-title">
                ${safeText(deal.listingName || `${deal.brand || ""} ${deal.model || ""}`.trim() || "Unnamed deal")}
              </div>

              <div class="price-row">
                <span class="sale-price">${money(deal.salePrice)}</span>
                <span class="orig-price">${money(deal.originalPrice)}</span>
                <span class="discount">${pct(deal.discountPercent)}</span>
              </div>

              <div class="deal-meta">
                <span>brand: ${safeText(deal.brand || "—")}</span>
                <span>model: ${safeText(deal.model || "—")}</span>
                <span>gender: ${safeText(deal.gender || "—")}</span>
                <span>shoeType: ${safeText(deal.shoeType || "—")}</span>
              </div>

              ${
                deal.listingURL
                  ? `<a class="deal-link" href="${deal.listingURL}" target="_blank" rel="noreferrer">Open listing</a>`
                  : ""
              }
            </div>
          </div>
        `).join("");
      }
    }

    document.getElementById("searchInput").addEventListener("input", renderStores);
    loadStores();
  </script>
</body>
</html>
